<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATLAS+ | Industrial Portal</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header>
        <div class="brand">
            <h1>ATLAS <span>+</span></h1>
        </div>
        
        <div class="view-toggle-center">
            <button id="engineerBtn" class="toggle-pill active" onclick="switchView('engineer')">ENGINEER</button>
            <button id="technicianBtn" class="toggle-pill" onclick="switchView('technician')">TECHNICIAN</button>
        </div>

        <div class="role-display" id="role-tag">
            ROLE: ENGINEER
        </div>
    </header>

    <main>
        <!-- Hero Section -->
        <section class="hero-stats">
            <div class="stat-card">
                <div class="stat-label">Total Machines</div>
                <div class="stat-value" id="stat-total">0</div>
            </div>
            <div class="stat-card" style="border-left: 2px solid var(--accent-red)">
                <div class="stat-label">Critical Alerts</div>
                <div class="stat-value" id="stat-critical" style="color: var(--accent-red)">0</div>
            </div>
            <div class="stat-card" style="border-left: 2px solid var(--accent-yellow)">
                <div class="stat-label">System Health</div>
                <div class="stat-value" id="stat-health">98%</div>
            </div>
        </section>

        <!-- Machine Grid -->
        <h3 class="main-grid-title">Machine Analysis</h3>
        <section class="machine-grid" id="main-grid">
            <!-- Cards injected here -->
        </section>

        <!-- Bottom Layout -->
        <div class="bottom-layout">
            <div class="panel-card">
                <h2>Diagnostic Alerts</h2>
                <div id="alerts-list">
                    <!-- Alerts injected here -->
                </div>
            </div>
            <div class="panel-card">
                <h2>Risk Priority</h2>
                <div id="priority-list">
                    <!-- Priority row injected here -->
                </div>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
