<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATLAS+ | Tactical Intelligence Portal</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="side-nav">
            <div class="side-top">
                <div class="brand">ATLAS <span>+</span></div>
                <div class="sentinel-tag">
                    <div class="sentinel-icon">🛡️</div>
                    <div>
                        <div class="s-ver">SENTINEL V2.4</div>
                        <div class="s-node">NODE: OSCAR-09</div>
                    </div>
                </div>
            </div>

            <nav class="nav-menu">
                <a href="#" class="nav-item"><span>OVERVIEW</span></a>
                <a href="#" class="nav-item active"><span>TELEMETRY</span></a>
                <a href="#" class="nav-item"><span>RISK MATRIX</span></a>
                <a href="#" class="nav-item"><span>AI INSIGHTS</span></a>
                <a href="#" class="nav-item"><span>SYSTEM LOG</span></a>
            </nav>

            <button class="emergency-btn">EMERGENCY STOP</button>
        </aside>

        <!-- Main Workspace -->
        <div class="main-wrapper">
            <header class="top-bar">
                <div class="view-links">
                    <a href="#" id="digitalTab" class="active" onclick="showPage('digitalTwinPage')">Digital Twin</a>
                    <a href="#" id="alertsTab" onclick="showPage('alertStackPage')">Alert Stack</a>
                    <a href="#" id="analyticsTab" onclick="showPage('analyticsPage')">Analytics</a>
                    <a href="#" id="diagnosticsTab" onclick="showPage('diagnosticsPage')">Diagnostics</a>
                </div>
                
                <div class="top-actions">
                    <div class="search-box">
                        <input type="text" placeholder="Search parameters...">
                    </div>
                    <div class="icon-btn">🔔</div>
                    <div class="icon-btn">⚙️</div>
                    <div class="user-avatar"></div>
                </div>
            </header>

            <main class="dashboard-grid">
                <!-- Content Area -->
                <section class="viewport-content" id="main-content">
                    <div id="digitalTwinPage" class="page">
                        <!-- Digital Twin Content -->
                    </div>
                    <div id="alertStackPage" class="page" style="display: none;">
                        <!-- Alert Stack Content -->
                    </div>
                    <div id="analyticsPage" class="page" style="display: none;">
                        <!-- Analytics Content -->
                    </div>
                    <div id="diagnosticsPage" class="page" style="display: none;">
                        <!-- Diagnostics Content -->
                    </div>
                </section>

                <!-- Insights Sidebar -->
                <aside class="insight-sidebar">
                    <div class="insight-header">
                        <span class="ai-icon">🧠</span>
                        <div>
                            <h3>AI INSIGHTS</h3>
                            <p>Explainable AI Core Active</p>
                        </div>
                    </div>

                    <div id="insight-feed" class="insight-feed">
                        <!-- Alert cards injected here -->
                    </div>

                    <div class="live-feed">
                        <div class="feed-img" id="machine-node-view">
                            <!-- Visual placeholder or image -->
                             <span>LIVE FEED: NODE-09</span>
                        </div>
                    </div>

                    <div class="system-health-panel">
                        <div class="health-meta">
                            <span>SYSTEM HEALTH</span>
                            <span class="health-status">OPTIMAL</span>
                        </div>
                        <div class="health-steps">
                            <div class="step active"></div>
                            <div class="step active"></div>
                            <div class="step active"></div>
                            <div class="step active"></div>
                            <div class="step"></div>
                        </div>
                    </div>
                </aside>
            </main>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
